<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - Brook Cottage</title>
  <meta name="robots" content="noindex, follow">
  <style>
    :root {
      --sage: #7b8573;
      --sage-dark: #6d7a69;
      --cream: #f7f5ef;
      --text: #3f4540;
      --muted: #6f746d;
      --white: #ffffff;
      --border: #d8ddd2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }
    .topbar {
      background: var(--sage-dark);
      color: var(--white);
      font-size: 13px;
      padding: 10px 20px;
      text-align: center;
    }
    .hero {
      background: var(--sage);
      color: var(--white);
      border-top: 1px solid rgba(255,255,255,0.45);
      border-bottom: 1px solid rgba(255,255,255,0.45);
      padding: 56px 20px;
      text-align: center;
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 700;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 56px 20px 72px;
    }
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 36px 28px;
      box-shadow: 0 8px 24px rgba(64, 73, 59, 0.08);
      text-align: center;
    }
    .card h2 {
      color: var(--sage-dark);
      font-size: 2rem;
      margin: 0 0 16px;
    }
    .card p {
      margin: 0 auto 14px;
      max-width: 38rem;
      line-height: 1.7;
      color: var(--muted);
      font-size: 1.05rem;
    }
    .actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }
    .btn {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 700;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }
    .btn-primary {
      background: var(--sage-dark);
      color: var(--white);
      border: 1px solid var(--sage-dark);
    }
    .btn-primary:hover { background: #5d6858; border-color: #5d6858; }
    .btn-secondary {
      background: var(--white);
      color: var(--sage-dark);
      border: 1px solid var(--sage-dark);
    }
    .btn-secondary:hover { background: #f0f2ed; }
  </style>
</head>
<body>
  <div class="topbar">07711407029 | eddieritson22@gmail.com</div>
  <header class="hero">
    <h1>Thank You</h1>
  </header>
  <main class="wrap">
    <section class="card">
      <h2>Message received</h2>
      <p>Thank you for getting in touch with Brook Cottage. Your enquiry has been sent successfully and we will get back to you as soon as possible.</p>
      <p>If your message is urgent, you can also call <strong>07711407029</strong>.</p>
      <div class="actions">
        <a class="btn btn-primary" href="/contact-us/">Back to Contact Us</a>
        <a class="btn btn-secondary" href="/">Return Home</a>
      </div>
    </section>
  </main>
</body>
</html>
